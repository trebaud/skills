<!doctype html>
<!-- Side-by-side recording stage: real terminal (ttyd) left, app/browser pane right.
     Both panes are iframes, so everything on camera is the real thing.
     Edit the bar labels and the #term src port to match your setup. -->
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0 }
body {
  height: 100vh; display: flex; gap: 14px; padding: 14px;
  background: linear-gradient(135deg, #11131a, #1a1d27);
  font: 13px ui-sans-serif, system-ui;
}
.pane {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  border-radius: 10px; overflow: hidden;
  border: 1px solid #2a2e3d;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  background: #14161b;
}
.bar {
  height: 30px; flex: none; display: flex; align-items: center; gap: 6px;
  padding: 0 12px; background: #1d2029; color: #8b91a7;
  border-bottom: 1px solid #2a2e3d;
}
.dot { width: 11px; height: 11px; border-radius: 50% }
.bar span { margin-left: 8px; font-size: 12px; letter-spacing: .02em }
iframe { flex: 1; border: 0; width: 100%; background: #14161b }
/* Keep the placeholder dark — a white pane before the app loads reads as a flash */
#preview { background: #14161b }
</style>
</head>
<body>
<div class="pane">
  <div class="bar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#febc2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span>nvim doc.md</span>
  </div>
  <iframe id="term" src="http://127.0.0.1:7681/"></iframe>
</div>
<div class="pane">
  <div class="bar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#febc2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span id="addr">browser</span>
  </div>
  <iframe id="preview" src="about:blank"></iframe>
</div>
</body>
</html>
