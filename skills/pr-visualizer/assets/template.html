<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PR TITLE}} — change visualization</title>
<style>
  :root{
    --bg:#0f1117; --bg2:#161922; --panel:#1c2030; --panel2:#232838;
    --line:#2c3245; --txt:#e7eaf3; --muted:#9aa3bd; --faint:#6b7494;
    --indigo:#7c8cff; --indigo2:#5566f0; --violet:#b98bff;
    --green:#46d6a0; --amber:#ffb454; --red:#ff6b81; --cyan:#5bd6e6;
    --radius:14px; --maxw:1120px;
    --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:radial-gradient(1200px 600px at 75% -10%,#1d2236 0%,var(--bg) 55%);color:var(--txt);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--indigo);text-decoration:none}
  code{font-family:var(--mono);font-size:.86em;background:#0c0e15;border:1px solid var(--line);padding:.1em .4em;border-radius:6px;color:#cdd6f4}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* nav */
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(15,17,23,.78);border-bottom:1px solid var(--line)}
  nav .wrap{display:flex;align-items:center;gap:8px;height:56px;flex-wrap:wrap}
  nav .brand{font-weight:700;letter-spacing:.2px;margin-right:auto;display:flex;align-items:center;gap:10px}
  nav .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--indigo);box-shadow:0 0 14px var(--indigo)}
  nav a.link{color:var(--muted);font-size:13px;padding:6px 10px;border-radius:8px;transition:.15s}
  nav a.link:hover{color:var(--txt);background:var(--panel)}

  /* hero */
  header.hero{padding:64px 0 28px}
  .kick{color:var(--violet);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:12px}
  h1{font-size:42px;line-height:1.1;margin:10px 0 14px;font-weight:800;background:linear-gradient(120deg,#fff,#aeb8ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lede{color:var(--muted);font-size:17px;max-width:760px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .chip{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--txt)}
  .chip b{color:var(--indigo)}
  .chip.amber{border-color:#5a431f;background:#241b0e;color:var(--amber)}
  .chip.green{border-color:#1f4a39;background:#0e211a;color:var(--green)}

  section{padding:40px 0;border-top:1px solid var(--line)}
  h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:0 0 6px}
  .h2title{font-size:26px;font-weight:750;margin:0 0 18px}
  .sub{color:var(--muted);max-width:780px;margin:-8px 0 22px}

  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}

  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card h3{margin:0 0 8px;font-size:16px}
  .card p{margin:0;color:var(--muted);font-size:14px}

  /* problem/fix callout */
  .callout{display:flex;gap:16px;align-items:flex-start;border:1px solid #5a2331;background:linear-gradient(180deg,#241420,#1a0f17);border-radius:var(--radius);padding:18px}
  .callout .ic{font-size:24px;line-height:1}
  .callout.fix{border-color:#1f4a39;background:linear-gradient(180deg,#0e211a,#0c1a15)}

  /* flow diagram */
  .flow{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
  .node{flex:1;min-width:150px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;position:relative}
  .node .t{font-weight:700;font-size:14px;margin-bottom:4px}
  .node .d{color:var(--muted);font-size:12.5px}
  .node .tag{position:absolute;top:-10px;left:14px;font-size:10.5px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:6px;text-transform:uppercase}
  .arrow{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:22px;padding:0 6px;flex:0 0 auto}
  @media(max-width:860px){.arrow{transform:rotate(90deg);width:100%;padding:6px 0}}
  .tag.api{background:#1a2740;color:var(--cyan);border:1px solid #244}
  .tag.db{background:#1d2a1f;color:var(--green);border:1px solid #2c5}
  .tag.user{background:#2a2340;color:var(--violet);border:1px solid #534}

  /* toggle */
  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px;margin-bottom:18px}
  .toggle button{border:0;background:transparent;color:var(--muted);font-weight:650;font-size:13px;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s;font-family:inherit}
  .toggle button.on{background:var(--indigo2);color:#fff;box-shadow:0 4px 14px rgba(85,102,240,.4)}
  .branch{display:none}
  .branch.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .verdict{margin-top:14px;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600}
  .verdict.skip{background:#241b0e;border:1px solid #5a431f;color:var(--amber)}
  .verdict.swap{background:#0e211a;border:1px solid #1f4a39;color:var(--green)}

  /* file cards */
  .files{display:grid;gap:10px}
  .frow{display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:start;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .frow.crit{border-color:#5a431f;background:linear-gradient(180deg,#241b0e,#1b1509)}
  .frow .badge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .badge.new{background:#0e211a;color:var(--green);border:1px solid #1f4a39}
  .badge.edit{background:#1a2740;color:var(--cyan);border:1px solid #234}
  .badge.crit{background:#241b0e;color:var(--amber);border:1px solid #5a431f}
  .frow .fp{font-family:var(--mono);font-size:13px;color:var(--txt);word-break:break-all}
  .frow .fd{color:var(--muted);font-size:13px;margin-top:3px}
  .pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:5px;margin-left:8px;vertical-align:middle}
  .pill.crit{background:#5a431f;color:#ffd9a0}

  /* schema */
  .schema{font-family:var(--mono);font-size:13px;background:#0c0e15;border:1px solid var(--line);border-radius:12px;padding:16px;overflow:auto;white-space:pre}
  .schema .k{color:var(--cyan)} .schema .c{color:var(--faint)} .schema .s{color:var(--green)} .schema .core{color:var(--amber);font-weight:700}

  /* timeline */
  .timeline{position:relative;margin-left:8px;padding-left:26px}
  .timeline:before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--indigo),transparent)}
  .titem{position:relative;margin-bottom:18px}
  .titem:before{content:"";position:absolute;left:-26px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--indigo);box-shadow:0 0 0 4px rgba(124,140,255,.15)}
  .titem .q{font-weight:700;font-size:14.5px}
  .titem .a{color:var(--green);font-size:13.5px;margin-top:2px}
  .titem .why{color:var(--muted);font-size:13px;margin-top:3px}

  /* edge cases */
  .edge{border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:14px}
  .edge .et{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .edge .ed{color:var(--muted);font-size:13px}
  .stat{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}
  .stat.ok{background:#0e211a;color:var(--green)} .stat.by{background:#241b0e;color:var(--amber)} .stat.note{background:#1a2740;color:var(--cyan)}

  /* checklist */
  ul.check{list-style:none;padding:0;margin:0;display:grid;gap:10px}
  ul.check li{display:flex;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px}
  ul.check li .cb{color:var(--green);font-weight:800}
  ul.check li code{font-size:12px}

  /* === SVG GRAPHS (architecture / sequence / flowchart) === */
  .gwrap{background:radial-gradient(700px 300px at 50% 0,#13182a,#0c0e15);border:1px solid var(--line);border-radius:var(--radius);padding:14px;overflow-x:auto}
  .gwrap svg{width:100%;height:auto;display:block;min-width:680px}
  .glegend{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-size:12.5px;color:var(--muted)}
  .glegend span{display:inline-flex;align-items:center;gap:7px}
  .glegend i{width:22px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .glegend .sw{width:12px;height:12px;border-radius:4px;border:1px solid;display:inline-block}
  .hint{font-size:12px;color:var(--faint);margin-top:8px}
  /* interactive nodes/edges (architecture graph): add class="depgraph" to the <svg> */
  .gnode{transition:opacity .18s}
  .gnode rect{transition:filter .18s}
  .gnode .nt{font-weight:750;font-size:13px;fill:var(--txt)}
  .gnode .ns{font-size:10.5px;fill:var(--muted);font-family:var(--mono)}
  .gedge{transition:opacity .18s}
  .gedge text{font-family:var(--mono);fill:var(--faint);font-size:10px}
  svg.hovering .gnode:not(.hot){opacity:.22}
  svg.hovering .gedge:not(.hot){opacity:.1}
  .hot rect{filter:drop-shadow(0 0 9px currentColor)}
  /* animated "packet" travelling an edge: <path class="pkt" pathLength="100" .../> */
  .pkt{fill:none;stroke-linecap:round;stroke-dasharray:3 97;animation:pkt 2.6s linear infinite}
  @keyframes pkt{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}

  footer{padding:40px 0 70px;color:var(--faint);font-size:13px;border-top:1px solid var(--line)}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px;font-size:12.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .sw{width:12px;height:12px;border-radius:4px;display:inline-block}
</style>
</head>

<script>
  // Generic toggle: each toggle group calls setBranch('<groupId>','<variant>').
  // Branches are <div id="<groupId>-<variant>" class="branch">; buttons are id="<groupId>-btn-<variant>".
  function setBranch(group, which){
    document.querySelectorAll('[id^="'+group+'-"].branch').forEach(b=>{
      b.classList.toggle('show', b.id === group+'-'+which);
    });
    document.querySelectorAll('[id^="'+group+'-btn-"]').forEach(btn=>{
      btn.classList.toggle('on', btn.id === group+'-btn-'+which);
    });
  }
  // Architecture-graph hover-highlight. Works on any <svg class="depgraph">.
  // Nodes: <g class="gnode" data-id="X">. Edges: <g class="gedge" data-from="X" data-to="Y">.
  document.querySelectorAll('svg.depgraph').forEach(svg=>{
    const edges=[...svg.querySelectorAll('.gedge')];
    const nodes=[...svg.querySelectorAll('.gnode')];
    const clear=()=>{ svg.classList.remove('hovering'); [...edges,...nodes].forEach(el=>el.classList.remove('hot')); };
    nodes.forEach(n=>{
      const id=n.dataset.id;
      n.addEventListener('mouseenter',()=>{
        svg.classList.add('hovering'); n.classList.add('hot');
        edges.forEach(e=>{
          if(e.dataset.from===id||e.dataset.to===id){
            e.classList.add('hot');
            const other=e.dataset.from===id?e.dataset.to:e.dataset.from;
            const on=nodes.find(x=>x.dataset.id===other); if(on) on.classList.add('hot');
          }
        });
      });
      n.addEventListener('mouseleave',clear);
    });
  });
  // Sticky-nav scroll-spy
  const links=[...document.querySelectorAll('nav a.link')];
  const map=Object.fromEntries(links.map(l=>[l.getAttribute('href').slice(1),l]));
  const obs=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>{l.style.color='';l.style.background='';}); const a=map[e.target.id]; if(a){a.style.color='var(--txt)';a.style.background='var(--panel)';} }});
  },{rootMargin:'-45% 0px -50% 0px'});
  document.querySelectorAll('section[id]').forEach(s=>obs.observe(s));
</script>
